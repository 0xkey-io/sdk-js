name: Version Packages Create Release Branch and Publish

on:
  workflow_dispatch:
    inputs:
      enable_release:
        description: "Run the protected release workflow"
        required: true
        type: boolean
        default: false
      publish_to_npm:
        description: "Publish packages to npm after versioning and integration tests"
        required: true
        type: boolean
        default: false
      skip_integration_tests:
        description: "Skip preprod/prod integration tests (publish without API secrets)"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*.*.*" # Tag pushes are intentionally guarded; they do not publish automatically.

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_release }}
    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # required for git tags and history
          ref: ${{ github.event.repository.default_branch }}

      # Install and cache JS toolchain and dependencies (node_modules)
      - name: Setup JS
        uses: ./.github/actions/js-setup

      # Check if there are pending changesets
      - name: Check for pending releases
        run: |
          echo "Checking for pending changesets..."
          git fetch origin main
          CHANGES_STATUS=$(pnpm changeset status --verbose)
          echo "$CHANGES_STATUS"
          if echo "$CHANGES_STATUS" | grep -qi "packages to be bumped"; then
            echo "Changesets found, continuing"
          else
            echo "No unreleased changesets found, exiting"
            exit 1
          fi

      - name: Debug Foundry
        run: anvil --version || echo "anvil not found"

      - name: Build
        run: pnpm run build-all

      - name: Typecheck
        run: pnpm run typecheck-all

      - name: Prettier
        run: pnpm run prettier-all:check

  version-and-rebuild:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # required for git tags and history
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup JS
        uses: ./.github/actions/js-setup

      - name: Configure Git User
        run: |
          git config user.name "0xkey-deploy"
          git config user.email "github@0xkey.io"

      # release/* is a use-once-and-discard scratch branch, never a long-lived
      # branch. It must always be cut fresh from the commit we just checked
      # out above (the default branch tip), never reused from a stale remote
      # copy left over by a previous run - otherwise a leftover
      # origin/release/<ref> branch would silently resurrect old, already
      # superseded version bumps/changesets instead of the current main.
      - name: Create fresh release branch from the latest default branch
        run: |
          git fetch origin
          git push origin --delete release/${{ github.ref_name }} || \
            echo "No stale origin/release/${{ github.ref_name }} to delete"
          git checkout -B release/${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Process changesets, update versions, and rebuild packages to include latest versions
      - name: Version and rebuild packages
        run: |
          pnpm changeset version
          pnpm run version
          pnpm install -r
          pnpm run build-all
          pnpm run typecheck-all
          pnpm run prettier-all:check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug Git Status
        run: |
          echo "Git status before commit:"
          git status --short
          echo "Listing .changeset directory:"
          ls -la .changeset || echo ".changeset directory not found"

      - name: Commit versioned changes
        run: |
          git add -A
          git commit -m "chore: release packages" || echo "No changes to commit"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push changes to release branch
        run: |
          # -f is safe/expected here: release/${{ github.ref_name }} is the
          # disposable scratch branch we just deleted and recreated above, so
          # this is never rewriting history anyone else has based work on.
          git push -f -u origin release/${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-pre-prod:
    runs-on: ubuntu-latest
    needs: version-and-rebuild
    if: ${{ !inputs.skip_integration_tests }}
    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # required for git tags and history
          ref: release/${{ github.ref_name }}

      # Install and cache JS toolchain and dependencies (node_modules)
      - name: Setup JS
        uses: ./.github/actions/js-setup

      - name: Install latest dependencies
        run: pnpm install -r --frozen-lockfile

      - name: Build all packages
        run: pnpm run build-all

      - name: Test (preprod)
        run: anvil & pnpm run test-all && lsof -t -i tcp:8545 | xargs kill
        env:
          API_PUBLIC_KEY: ${{ secrets.PREPROD_API_PUBLIC_KEY }}
          API_PRIVATE_KEY: ${{ secrets.PREPROD_API_PRIVATE_KEY }}
          BASE_URL: ${{ secrets.PREPROD_BASE_URL }}
          ORGANIZATION_ID: ${{ secrets.PREPROD_ORGANIZATION_ID }}
          PRIVATE_KEY_ID: ${{ secrets.PREPROD_PRIVATE_KEY_ID }}
          EXPECTED_PRIVATE_KEY_ETH_ADDRESS: ${{ secrets.PREPROD_EXPECTED_PRIVATE_KEY_ETH_ADDRESS }}
          EXPECTED_PRIVATE_KEY_ETH_ADDRESS_2: ${{ secrets.PREPROD_EXPECTED_PRIVATE_KEY_ETH_ADDRESS_2 }}
          EXPECTED_WALLET_ACCOUNT_ETH_ADDRESS: ${{ secrets.PREPROD_EXPECTED_WALLET_ACCOUNT_ETH_ADDRESS }}
          EXPECTED_WALLET_ACCOUNT_ETH_ADDRESS_2: ${{ secrets.PREPROD_EXPECTED_WALLET_ACCOUNT_ETH_ADDRESS_2 }}
          BANNED_TO_ADDRESS: ${{ secrets.PREPROD_BANNED_TO_ADDRESS }}
          SOLANA_TEST_ORG_API_PRIVATE_KEY: ${{ secrets.SOLANA_TEST_ORG_API_PRIVATE_KEY }}
          WALLET_ID: ${{ secrets.PREPROD_WALLET_ID }}

  test-prod:
    runs-on: ubuntu-latest
    needs: test-pre-prod
    if: ${{ !inputs.skip_integration_tests }}
    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # required for git tags and history
          ref: release/${{ github.ref_name }}

      # Install and cache JS toolchain and dependencies (node_modules)
      - name: Setup JS
        uses: ./.github/actions/js-setup

      - name: Install latest dependencies
        run: pnpm install -r --frozen-lockfile

      - name: Build all packages
        run: pnpm run build-all

      - name: Test (prod)
        run: anvil & pnpm run test-all && lsof -t -i tcp:8545 | xargs kill
        env:
          API_PUBLIC_KEY: ${{ secrets.API_PUBLIC_KEY }}
          API_PRIVATE_KEY: ${{ secrets.API_PRIVATE_KEY }}
          BASE_URL: "https://api.0xkey.io"
          ORGANIZATION_ID: ${{ secrets.ORGANIZATION_ID }}
          PRIVATE_KEY_ID: ${{ secrets.PRIVATE_KEY_ID }}
          EXPECTED_PRIVATE_KEY_ETH_ADDRESS: ${{ secrets.EXPECTED_PRIVATE_KEY_ETH_ADDRESS }}
          EXPECTED_PRIVATE_KEY_ETH_ADDRESS_2: ${{ secrets.EXPECTED_PRIVATE_KEY_ETH_ADDRESS_2 }}
          EXPECTED_WALLET_ACCOUNT_ETH_ADDRESS: ${{ secrets.EXPECTED_WALLET_ACCOUNT_ETH_ADDRESS }}
          EXPECTED_WALLET_ACCOUNT_ETH_ADDRESS_2: ${{ secrets.EXPECTED_WALLET_ACCOUNT_ETH_ADDRESS_2 }}
          BANNED_TO_ADDRESS: "0x6F72eDB2429820c2A0606a9FC3cA364f5E9b2375"
          SOLANA_TEST_ORG_API_PRIVATE_KEY: ${{ secrets.SOLANA_TEST_ORG_API_PRIVATE_KEY }}
          WALLET_ID: ${{ secrets.WALLET_ID }}

  publish:
    needs: [version-and-rebuild, test-pre-prod, test-prod]
    if: >-
      ${{ always()
      && needs.version-and-rebuild.result == 'success'
      && (needs.test-pre-prod.result == 'success' || needs.test-pre-prod.result == 'skipped')
      && (needs.test-prod.result == 'success' || needs.test-prod.result == 'skipped')
      && github.event_name == 'workflow_dispatch' && inputs.enable_release && inputs.publish_to_npm }}
    runs-on: ubuntu-latest
    environment: production # require manual approval for production deployments

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # required for git tags and history
          ref: release/${{ github.ref_name }}

      - name: Configure Git User
        run: |
          git config user.name "0xkey-deploy"
          git config user.email "github@0xkey.io"

      - name: Setup Node, pnpm, and deps
        uses: ./.github/actions/js-setup

      - name: Install latest dependencies
        run: pnpm install -r --frozen-lockfile

      # Rebuild from the versioned release branch instead of relying on a
      # cross-job artifact upload (which is slow/flaky for many small files).
      # build-all runs in topological order so every package has fresh dist.
      - name: Build all packages
        run: pnpm run build-all

      - name: Confirm environment variables
        run: |
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "GITHUB_TOKEN is set"
          else
            echo "GITHUB_TOKEN is not set"
            exit 1
          fi
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN is set"
          else
            echo "NPM_TOKEN is not set"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM (dry run)
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          pnpm publish -r --dry-run --no-git-checks --report-summary
          echo "npm publish dry run summary:"
          cat publish-summary.json || echo "No NPM dry run summary generated"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish packages to NPM
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "Publishing packages to NPM..."
          # changeset publish only publishes packages whose version is not yet
          # on the registry, so partial releases (only the changeset-bumped
          # packages) work and already-published versions are skipped instead
          # of failing with "cannot publish over the previously published versions".
          pnpm exec changeset publish || {
            echo "❌ Publish failed. Check logs above.";
            exit 1;
          }
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Bring the "chore: release packages" version-bump commit (produced on the
  # scratch release/* branch by version-and-rebuild) back onto the default
  # branch once publish has actually succeeded. Without this, package.json
  # versions on the default branch permanently drift behind what's live on
  # npm, and .changeset/*.md files are never cleared - both bugs this job
  # exists to close. See root-cause discussion in the PR that introduced it.
  sync-main:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ needs.publish.result == 'success' }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # required to evaluate fast-forward ancestry
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure Git User
        run: |
          git config user.name "0xkey-deploy"
          git config user.email "github@0xkey.io"

      - name: Fetch release branch
        run: git fetch origin release/${{ github.ref_name }}

      - name: Fast-forward default branch to the published version bump
        id: ff
        run: |
          if git merge --ff-only origin/release/${{ github.ref_name }}; then
            git push origin HEAD:${{ github.event.repository.default_branch }}
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::${{ github.event.repository.default_branch }} advanced since release/${{ github.ref_name }} was cut; cannot fast-forward, opening a PR instead."
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi

      # Rare path: only hit if someone pushed to the default branch while
      # build/version/test/publish were running. Never force-pushes over
      # those new commits - opens a normal PR for a human to merge instead.
      - name: Open PR to sync version bump if fast-forward was not possible
        if: ${{ steps.ff.outputs.merged == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="chore/sync-release-${{ github.run_id }}"
          git checkout -B "$SYNC_BRANCH" origin/release/${{ github.ref_name }}
          git push -u origin "$SYNC_BRANCH"
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$SYNC_BRANCH" \
            --title "chore: sync published package versions back to ${{ github.event.repository.default_branch }} (run #${{ github.run_id }})" \
            --body "Automated version-bump commit from \`release/${{ github.ref_name }}\` (already published to npm by this run) could not be fast-forwarded onto \`${{ github.event.repository.default_branch }}\` because the base branch advanced during this release. Please review and merge to keep package.json versions and \`.changeset/\` in sync with what's live on npm."

  prepare-release:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_release && inputs.publish_to_npm }}
    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # required for git tags and history
          ref: release/${{ github.ref_name }}

      - name: Setup JS
        uses: ./.github/actions/js-setup

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
